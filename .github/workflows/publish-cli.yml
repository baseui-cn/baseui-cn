name: Publish CLI

on:
  workflow_dispatch:
  push:
    tags:
      - "cli-v*"

concurrency:
  group: publish-cli-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches CLI version
        if: startsWith(github.ref, 'refs/tags/cli-v')
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./packages/cli/package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#cli-v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match packages/cli/package.json ($PACKAGE_VERSION)."
            exit 1
          fi

      - name: Build generated registry artifacts
        run: pnpm run build:all

      - name: Type-check CLI package
        run: pnpm --filter ./packages/cli exec tsc --noEmit

      - name: Build CLI package
        run: pnpm --filter ./packages/cli build

      - name: Publish CLI to npm
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish --access public --no-git-checks
